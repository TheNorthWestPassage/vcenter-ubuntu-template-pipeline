---
- name: Deploy VM from Golden Template
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    # Connection
    vcenter_server: "{{ lookup('env', 'VCENTER_SERVER') }}"
    vcenter_user: "{{ lookup('env', 'VCENTER_USERNAME') }}"
    vcenter_password: "{{ lookup('env', 'VCENTER_PASSWORD') }}"
    
    # Infrastructure
    datacenter: "{{ lookup('env', 'VCENTER_DATACENTER') }}"
    cluster: "{{ lookup('env', 'VCENTER_CLUSTER') }}"
    datastore: "{{ lookup('env', 'VCENTER_DATASTORE') }}"
    library_name: "{{ lookup('env', 'CONTENT_LIBRARY_NAME') | default('UBUNTU', true) }}"
    template_name: "{{ lookup('env', 'CONTENT_LIBRARY_ITEM_NAME') | default('ubuntu-26.04-official-v1', true) }}"
    vm_network: "{{ lookup('env', 'VCENTER_NETWORK') }}"
    esxi_host: "{{ lookup('env', 'DEPLOY_ESXI_HOST') | default(omit, true) }}"
    
    # Targeting
    vm_name: "{{ lookup('env', 'RUNTIME_VM_NAME') | default(lookup('env', 'DEPLOY_VM_NAME') | default('ubuntu-' ~ ansible_date_time.date, true), true) }}"
    folder: "{{ lookup('env', 'RUNTIME_DEPLOY_FOLDER') | default(lookup('env', 'VCENTER_DEPLOY_TEST_FOLDER'), true) }}"
    
    # Customization
    cpus: "{{ lookup('env', 'DEPLOY_CPU_COUNT') | default(2, true) }}"
    memory_mb: "{{ lookup('env', 'DEPLOY_MEMORY_MB') | default(4096, true) }}"

  tasks:
    - name: Debug Deployment Details
      ansible.builtin.debug:
        msg: 
          - "Targeting Folder: {{ folder }}"
          - "Targeting Host: {{ esxi_host | default('Dynamic (Cluster Managed)', true) }}"
          - "VM Name: {{ vm_name }}"

    - name: Check if VM already exists
      community.vmware.vmware_guest_info:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        datacenter: "{{ datacenter }}"
        name: "{{ vm_name }}"
      register: vm_info_check
      failed_when: false

    - name: Set VM existence fact
      set_fact:
        vm_exists: "{{ vm_info_check.instance is defined }}"

    - block:
        - name: Create local temporary directory for cloud-init
          ansible.builtin.tempfile:
            state: directory
            suffix: cloudinit
          register: local_temp_dir
          when: not vm_exists

        - name: Generate cloud-init config files
          ansible.builtin.copy:
            content: "{{ item.content }}"
            dest: "{{ local_temp_dir.path }}/{{ item.name }}"
            mode: '0644'
          loop:
            - { name: 'user-data', content: "{{ lookup('file', '../build/user-data') | replace('shell: /bin/bash', 'shell: /bin/bash\n    ssh_authorized_keys:\n      - ' ~ lookup('env', 'SSH_ADMIN_SSH_PUBKEY')) | replace('passwd: \"$6$gE2rmgSkNP4ffN15$ltAwlmgjgFNuR9Xb8RXGVv4YIelD3vBQDT5wh2ttv3L0/o8eH/KTAxYwT.6OKnsrYAYtOXCeOsB0Rm3MkVBp9.\"', 'password: ' ~ lookup('env', 'SSH_ADMIN_PASSWORD')) }}" }
            - { name: 'meta-data', content: "instance-id: {{ vm_name }}\nlocal-hostname: {{ vm_name }}" }
          when: not vm_exists

        - name: Build cidata ISO
          ansible.builtin.command:
            cmd: "genisoimage -output {{ local_temp_dir.path }}/cidata.iso -volid cidata -joliet -rock user-data meta-data"
            chdir: "{{ local_temp_dir.path }}"
          delegate_to: localhost
          when: not vm_exists

        - name: Upload cidata ISO to Datastore
          community.vmware.vsphere_copy:
            hostname: "{{ vcenter_server }}"
            username: "{{ vcenter_user }}"
            password: "{{ vcenter_password }}"
            validate_certs: false
            datacenter: "{{ datacenter }}"
            datastore: "{{ datastore }}"
            src: "{{ local_temp_dir.path }}/cidata.iso"
            dest: "ISO/cloud-init/{{ vm_name }}-cidata.iso"
          delegate_to: localhost
          when: not vm_exists

        - name: Deploy OVF from Content Library
          vmware.vmware.deploy_content_library_ovf:
            hostname: "{{ vcenter_server }}"
            username: "{{ vcenter_user }}"
            password: "{{ vcenter_password }}"
            validate_certs: false
            datacenter: "{{ datacenter }}"
            cluster: "{{ cluster }}"
            host: "{{ esxi_host | default(omit, true) }}"
            datastore: "{{ datastore }}"
            folder: "{{ folder }}"
            vm_name: "{{ vm_name }}"
            library_item_name: "{{ template_name }}"
            library_name: "{{ library_name }}"
          register: deploy_status
          when: not vm_exists

        - name: Add CD-ROM and Mount ISO via govc
          ansible.builtin.shell:
            cmd: |
              ../build/govc device.cdrom.add -u="{{ vcenter_user }}:{{ vcenter_password }}@{{ vcenter_server }}" -k=true -vm="{{ vm_name }}"
              ../build/govc device.cdrom.insert -u="{{ vcenter_user }}:{{ vcenter_password }}@{{ vcenter_server }}" -k=true -vm="{{ vm_name }}" -ds="{{ datastore }}" "ISO/cloud-init/{{ vm_name }}-cidata.iso"
          environment:
            GOVC_INSECURE: "true"
          when: not vm_exists

        - name: Ensure VM settings and Power On
          community.vmware.vmware_guest:
            hostname: "{{ vcenter_server }}"
            username: "{{ vcenter_user }}"
            password: "{{ vcenter_password }}"
            validate_certs: false
            datacenter: "{{ datacenter }}"
            name: "{{ vm_name }}"
            state: poweredon
            hardware:
              memory_mb: "{{ memory_mb }}"
              num_cpus: "{{ cpus }}"
            networks:
              - name: "{{ vm_network }}"
                type: dhcp
                start_connected: true

        - name: Pause for GOSC initialization
          ansible.builtin.pause:
            seconds: 30

        - name: Wait for IPv4 to be reported by VMware Tools
          community.vmware.vmware_guest_info:
            hostname: "{{ vcenter_server }}"
            username: "{{ vcenter_user }}"
            password: "{{ vcenter_password }}"
            validate_certs: false
            datacenter: "{{ datacenter }}"
            name: "{{ vm_name }}"
          register: vm_info
          until: vm_info.instance.ipv4 is defined and vm_info.instance.ipv4 != "" and vm_info.instance.ipv4 != None
          retries: 60
          delay: 10

        - name: Set IP fact
          set_fact:
            vm_ip_addr: "{{ vm_info.instance.ipv4 }}"

        - name: Output the assigned IP
          ansible.builtin.debug:
            msg: "VM {{ vm_name }} has IP {{ vm_ip_addr }}"

        - name: Save IP to file
          ansible.builtin.shell: echo "{{ vm_ip_addr }}" > /tmp/last_vm_ip
          delegate_to: localhost

      always:
        - name: Cleanup local temporary directory
          ansible.builtin.file:
            path: "{{ local_temp_dir.path }}"
            state: absent
          when: 
            - not vm_exists
            - local_temp_dir.path is defined
          delegate_to: localhost

        - name: Eject CD-ROM via govc
          ansible.builtin.shell:
            cmd: |
              ../build/govc device.cdrom.eject -u="{{ vcenter_user }}:{{ vcenter_password }}@{{ vcenter_server }}" -k=true -vm="{{ vm_name }}"
          environment:
            GOVC_INSECURE: "true"
          when: not vm_exists
          ignore_errors: true
          delegate_to: localhost

        - name: Cleanup datastore ISO via govc
          ansible.builtin.shell:
            cmd: |
              ../build/govc datastore.rm -f -u="{{ vcenter_user }}:{{ vcenter_password }}@{{ vcenter_server }}" -k=true -ds="{{ datastore }}" "ISO/cloud-init/{{ vm_name }}-cidata.iso"
          environment:
            GOVC_INSECURE: "true"
          when: not vm_exists
          ignore_errors: true
          delegate_to: localhost
