---
- name: Deploy VM from Golden Template
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    # Connection
    vcenter_server: "{{ lookup('env', 'VCENTER_SERVER') }}"
    vcenter_user: "{{ lookup('env', 'VCENTER_USERNAME') }}"
    vcenter_password: "{{ lookup('env', 'VCENTER_PASSWORD') }}"
    
    # Infrastructure
    datacenter: "{{ lookup('env', 'VCENTER_DATACENTER') }}"
    cluster: "{{ lookup('env', 'VCENTER_CLUSTER') }}"
    datastore: "{{ lookup('env', 'VCENTER_DATASTORE') }}"
    library_name: "{{ lookup('env', 'CONTENT_LIBRARY_NAME') | default('UBUNTU', true) }}"
    template_name: "{{ lookup('env', 'CONTENT_LIBRARY_ITEM_NAME') | default('ubuntu-26.04-official', true) }}"
    vm_network: "{{ lookup('env', 'VCENTER_NETWORK') }}"
    esxi_host: "{{ lookup('env', 'DEPLOY_ESXI_HOST') | default(omit, true) }}"
    
    # Targeting
    vm_name: "{{ lookup('env', 'RUNTIME_VM_NAME') | default(lookup('env', 'DEPLOY_VM_NAME') | default('ubuntu-' ~ ansible_date_time.date, true), true) }}"
    folder: "{{ lookup('env', 'RUNTIME_DEPLOY_FOLDER') | default(lookup('env', 'VCENTER_DEPLOY_TEST_FOLDER'), true) }}"
    
    # Customization
    cpus: "{{ lookup('env', 'DEPLOY_CPU_COUNT') | default(2, true) }}"
    memory_mb: "{{ lookup('env', 'DEPLOY_MEMORY_MB') | default(4096, true) }}"

  tasks:
    - name: Debug Deployment Details
      ansible.builtin.debug:
        msg: 
          - "Targeting Folder: {{ folder }}"
          - "Targeting Host: {{ esxi_host | default('Dynamic (Cluster Managed)', true) }}"
          - "VM Name: {{ vm_name }}"

    - name: Deploy OVF from Content Library
      community.vmware.vmware_content_deploy_ovf_template:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        datacenter: "{{ datacenter }}"
        cluster: "{{ cluster }}"
        host: "{{ esxi_host }}"
        datastore: "{{ datastore }}"
        folder: "{{ folder }}"
        name: "{{ vm_name }}"
        template: "{{ template_name }}"
        library: "{{ library_name }}"
      register: deploy_status

    - name: Ensure VM settings and Power On
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        datacenter: "{{ datacenter }}"
        name: "{{ vm_name }}"
        state: poweredon
        hardware:
          memory_mb: "{{ memory_mb }}"
          num_cpus: "{{ cpus }}"
        networks:
          - name: "{{ vm_network }}"
            type: dhcp
            start_connected: true
        customization:
          hostname: "{{ vm_name }}"

    - name: Pause for GOSC initialization
      ansible.builtin.pause:
        seconds: 30

    - name: Wait for IPv4 to be reported by VMware Tools
      community.vmware.vmware_guest_info:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        datacenter: "{{ datacenter }}"
        name: "{{ vm_name }}"
      register: vm_info
      until: vm_info.instance.ipv4 is defined and vm_info.instance.ipv4 != "" and vm_info.instance.ipv4 != None
      retries: 60
      delay: 10

    - name: Set IP fact
      set_fact:
        vm_ip_addr: "{{ vm_info.instance.ipv4 }}"

    - name: Output the assigned IP
      ansible.builtin.debug:
        msg: "VM {{ vm_name }} has IP {{ vm_ip_addr }}"

    - name: Save IP to file
      ansible.builtin.shell: echo "{{ vm_ip_addr }}" > /tmp/last_vm_ip
      delegate_to: localhost
