---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Ensure useful utilities are present
  ansible.builtin.apt:
    name:
      - htop
      - rsync
      - unzip
    state: present
