---
- name: Deploy VM from Golden Template
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Map to ENV vars, defaults to empty or specific values
    vcenter_server: "{{ lookup('env', 'VCENTER_SERVER') }}"
    vcenter_user: "{{ lookup('env', 'VCENTER_USERNAME') }}"
    vcenter_password: "{{ lookup('env', 'VCENTER_PASSWORD') }}"
    datacenter: "{{ lookup('env', 'VCENTER_DATACENTER') }}"
    cluster: "{{ lookup('env', 'VCENTER_CLUSTER') }}"
    datastore: "{{ lookup('env', 'VCENTER_DATASTORE') }}"
    template_name: "{{ lookup('env', 'CONTENT_LIBRARY_ITEM_NAME') }}"
    vm_name: "{{ lookup('env', 'DEPLOY_VM_NAME') }}"
    vm_network: "{{ lookup('env', 'VCENTER_NETWORK') }}"
    folder: "{{ lookup('env', 'VCENTER_DEPLOY_FOLDER') }}"
    # Use defaults if not provided
    cpus: "{{ lookup('env', 'DEPLOY_CPU_COUNT') | default(2, true) }}"
    memory_mb: "{{ lookup('env', 'DEPLOY_MEMORY_MB') | default(4096, true) }}"

  tasks:
    - name: Clone VM from Template
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        datacenter: "{{ datacenter }}"
        cluster: "{{ cluster }}"
        datastore: "{{ datastore }}"
        folder: "{{ folder }}"
        name: "{{ vm_name }}"
        template: "{{ template_name }}"
        state: poweredon
        hardware:
          memory_mb: "{{ memory_mb }}"
          num_cpus: "{{ cpus }}"
        networks:
          - name: "{{ vm_network }}"
            # Add IP config logic if needed, currently assumes DHCP/Cloud-init
            start_connected: true
      register: deploy_status

    - name: Wait for VM to get IP
      community.vmware.vmware_guest_tools_wait:
        hostname: "{{ vcenter_server }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_password }}"
        validate_certs: false
        name: "{{ vm_name }}"
      register: vm_facts

- name: Configure the New VM
  hosts: all
  become: true
  roles:
    - base
    - security
