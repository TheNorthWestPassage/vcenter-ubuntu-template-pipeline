---
- name: Packer Image Provisioning
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - curl
          - git
          - vim
          - net-tools
          - open-vm-tools
        state: present

    - name: Ensure management user is in sudoers
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/ansible
        line: "ansible ALL=(ALL) NOPASSWD:ALL"
        create: true
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Clean up apt
      ansible.builtin.apt:
        autoremove: true
        purge: true
        clean: true

    - name: Remove cloud-init state to allow re-running on clone
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/cloud/instances
        - /var/lib/cloud/instance
        - /var/lib/cloud/data
        - /var/lib/cloud/sem

    - name: Reset machine-id
      ansible.builtin.shell: |
        truncate -s 0 /etc/machine-id
        rm -f /var/lib/dbus/machine-id
        ln -s /etc/machine-id /var/lib/dbus/machine-id
      args:
        executable: /bin/bash
